name: Sync Packagist metadata

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  notify-packagist:
    name: Notify Packagist on push
    runs-on: ubuntu-latest
    environment: packagist

    steps:
      - name: Notify Packagist
        run: |
          curl --fail-with-body -X POST \
            "https://packagist.org/api/update-package?username=${{ secrets.PACKAGIST_USERNAME }}&apiToken=${{ secrets.PACKAGIST_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"repository":{"url":"https://github.com/ezequiel88/sdk-php-ingestao-vetorial"}}'