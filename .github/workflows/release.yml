name: Publish PHP SDK to Packagist

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    name: Validate and notify Packagist
    runs-on: ubuntu-latest
    environment: packagist

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPUnit
        run: ./vendor/bin/phpunit --testdox

      - name: Run PHPStan
        run: ./vendor/bin/phpstan analyse --memory-limit=256M

      - name: Notify Packagist
        run: |
          curl --fail-with-body -X POST \
            "https://packagist.org/api/update-package?username=${{ secrets.PACKAGIST_USERNAME }}&apiToken=${{ secrets.PACKAGIST_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"repository":{"url":"https://github.com/ezequiel88/sdk-php-ingestao-vetorial"}}'